spring.autoconfigure.exclude=org.springframework.boot.security.autoconfigure.SecurityAutoConfiguration,org.springframework.boot.security.autoconfigure.UserDetailsServiceAutoConfiguration,org.springframework.boot.security.autoconfigure.web.servlet.ServletWebSecurityAutoConfiguration,org.springframework.boot.security.autoconfigure.actuate.web.servlet.ManagementWebSecurityAutoConfiguration,org.springframework.boot.session.jdbc.autoconfigure.JdbcSessionAutoConfiguration

spring.datasource.url=${DATABASE_URL:jdbc:postgresql://localhost:5432/manga}
spring.datasource.username=${DATABASE_USERNAME:manga}
spring.datasource.password=${DATABASE_PASSWORD:manga_local_password}
spring.elasticsearch.uris=${ELASTICSEARCH_URIS:http://localhost:9200}
spring.rabbitmq.host=${RABBITMQ_HOST:localhost}
spring.rabbitmq.port=${RABBITMQ_PORT:5672}
spring.rabbitmq.username=${RABBITMQ_USERNAME:manga}
spring.rabbitmq.password=${RABBITMQ_PASSWORD:manga_local_password}

spring.flyway.enabled=${API_FLYWAY_ENABLED:false}
spring.jpa.hibernate.ddl-auto=none

storage.books.root=${BOOK_STORAGE_ROOT:./.local/storage}
storage.books.originals-dir=${BOOK_STORAGE_ORIGINALS_DIR:books}

management.endpoints.web.exposure.include=health
management.endpoint.health.probes.enabled=true
management.endpoint.health.show-details=always
management.health.elasticsearch.enabled=true
management.health.rabbit.enabled=true

debug=false
logging.level.root=INFO
